<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" width="920" height="460"
     font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="920" height="460" fill="#F4EDE4" rx="6"/>

  <!-- ── Grid rings (cx=290, cy=235, R=175) ── -->
  <!-- 0.2 -->
  <polygon points="290,200 323.3,224.2 310.6,263.3 269.4,263.3 256.7,224.2"
    fill="none" stroke="#000" stroke-opacity="0.07" stroke-width="1"/>
  <!-- 0.4 -->
  <polygon points="290,165 356.6,213.4 331.1,291.6 248.9,291.6 223.4,213.4"
    fill="none" stroke="#000" stroke-opacity="0.07" stroke-width="1"/>
  <!-- 0.6 -->
  <polygon points="290,130 389.9,202.6 351.7,319.9 228.3,319.9 190.1,202.6"
    fill="none" stroke="#000" stroke-opacity="0.07" stroke-width="1"/>
  <!-- 0.8 -->
  <polygon points="290,95 423.2,191.7 372.3,348.3 207.7,348.3 156.8,191.7"
    fill="none" stroke="#000" stroke-opacity="0.10" stroke-width="1"/>
  <!-- 1.0 -->
  <polygon points="290,60 456.4,180.9 392.9,376.6 187.1,376.6 123.6,180.9"
    fill="none" stroke="#000" stroke-opacity="0.14" stroke-width="1"/>

  <!-- ── Axis lines ── -->
  <line x1="290" y1="235" x2="290"   y2="60"   stroke="#000" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="290" y1="235" x2="456.4" y2="180.9" stroke="#000" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="290" y1="235" x2="392.9" y2="376.6" stroke="#000" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="290" y1="235" x2="187.1" y2="376.6" stroke="#000" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="290" y1="235" x2="123.6" y2="180.9" stroke="#000" stroke-opacity="0.12" stroke-width="1"/>

  <!-- ── Data polygons ── -->

  <!-- Mass-Market & Import (bottom layer)
       Craftsmanship=0.25, Cost=0.90, Output=0.95, Customization=0.15, Sustainability=0.30 -->
  <polygon points="290,191.3 439.8,186.3 387.7,369.5 274.6,256.2 240.1,218.8"
    fill="#C5A882" fill-opacity="0.32" stroke="#B8946A" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Boutique Craft/Studio (middle layer)
       Craftsmanship=0.95, Cost=0.35, Output=0.25, Customization=0.90, Sustainability=0.62 -->
  <polygon points="290,68.8 348.3,216.1 315.7,270.4 197.4,362.4 186.8,201.5"
    fill="#8B3535" fill-opacity="0.30" stroke="#7B2D2D" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Hybrid/Semi-Custom Model (top layer)
       Craftsmanship=0.85, Cost=0.75, Output=0.72, Customization=0.88, Sustainability=0.80 -->
  <polygon points="290,86.3 414.8,194.4 364.1,336.9 199.5,359.6 156.8,191.7"
    fill="#C85420" fill-opacity="0.40" stroke="#C85420" stroke-width="2" stroke-linejoin="round"/>

  <!-- ── Axis labels ── -->
  <text x="290" y="45" text-anchor="middle"
    font-size="12.5" font-weight="600" fill="#2C1810" letter-spacing="0.025em">Craftsmanship</text>

  <text x="466" y="178" text-anchor="start"
    font-size="12.5" font-weight="600" fill="#2C1810" letter-spacing="0.025em">Cost</text>

  <text x="400" y="400" text-anchor="start"
    font-size="12.5" font-weight="600" fill="#2C1810" letter-spacing="0.025em">Output</text>

  <text x="180" y="400" text-anchor="end"
    font-size="12.5" font-weight="600" fill="#2C1810" letter-spacing="0.025em">Customization</text>

  <text x="108" y="178" text-anchor="end"
    font-size="12.5" font-weight="600" fill="#2C1810" letter-spacing="0.025em">Sustainability</text>

  <!-- ── Vertical divider ── -->
  <line x1="548" y1="55" x2="548" y2="405" stroke="#000" stroke-opacity="0.10" stroke-width="1"/>

  <!-- ── Legend ── -->

  <!-- Hybrid/Semi-Custom Model -->
  <circle cx="572" cy="118" r="7.5" fill="#C85420"/>
  <text x="592" y="107" font-size="13.5" font-weight="700" fill="#2C1810">Hybrid/Semi-Custom Model</text>
  <text x="592" y="124" font-size="11.5" fill="#6B5444">Balances quality, customization, cost,</text>
  <text x="592" y="140" font-size="11.5" fill="#6B5444">and scalability — the strongest overall</text>
  <text x="592" y="156" font-size="11.5" fill="#6B5444">value proposition.</text>

  <line x1="566" y1="178" x2="908" y2="178" stroke="#000" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Boutique Craft/Studio -->
  <circle cx="572" cy="224" r="7.5" fill="#7B2D2D"/>
  <text x="592" y="213" font-size="13.5" font-weight="700" fill="#2C1810">Boutique Craft/Studio</text>
  <text x="592" y="230" font-size="11.5" fill="#6B5444">Highest quality and customization,</text>
  <text x="592" y="246" font-size="11.5" fill="#6B5444">but limited scale and cost prohibitive.</text>

  <line x1="566" y1="272" x2="908" y2="272" stroke="#000" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Mass-Market & Import -->
  <circle cx="572" cy="318" r="7.5" fill="#C5A882"/>
  <text x="592" y="307" font-size="13.5" font-weight="700" fill="#2C1810">Mass-Market &amp; Import</text>
  <text x="592" y="324" font-size="11.5" fill="#6B5444">High scale and low cost, sacrificing</text>
  <text x="592" y="340" font-size="11.5" fill="#6B5444">flexibility, customization, and quality.</text>

</svg>
